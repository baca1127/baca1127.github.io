<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐾 動物找找看</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #f9e8b4 0%, #fddb92 40%, #f9c58d 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    overflow: hidden;
    padding: 12px;
  }
  .game-box {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(16px);
    border-radius: 40px;
    padding: 24px 20px 28px;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    text-align: center;
  }
  h1 {
    font-size: 1.7rem;
    color: #5d3a1a;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .sub {
    font-size: 0.95rem;
    color: #8b6b41;
    margin-bottom: 14px;
  }
  .question {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    border-radius: 100px;
    padding: 12px 20px;
    font-size: 1.5rem;
    font-weight: bold;
    color: #4a2c0a;
    display: inline-block;
    margin-bottom: 18px;
    box-shadow: 0 4px 12px rgba(255,154,158,0.4);
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
  }
  .question .emoji-target { font-size: 2.2rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 16px;
  }
  .card {
    aspect-ratio: 1 / 1;
    background: #fff;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 3.8rem;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    touch-action: manipulation;
    border: 4px solid transparent;
    position: relative;
  }
  .card:active { transform: scale(0.94); }
  .card .label {
    font-size: 0.85rem;
    color: #7a5c38;
    margin-top: 4px;
    font-weight: 600;
  }
  .card.correct {
    animation: correctPop 0.5s ease forwards;
    border-color: #66bb6a;
    background: #e8f5e9;
  }
  .card.wrong {
    animation: shake 0.4s ease;
    border-color: #ef5350;
    background: #ffebee;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    30% { transform: scale(1.12); }
    60% { transform: scale(0.96); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .score-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    font-size: 1.1rem;
    color: #5d3a1a;
    font-weight: bold;
    padding: 8px 0 4px;
  }
  .star { color: #f9a825; font-size: 1.2rem; }
  .message-box {
    background: rgba(255,255,255,0.5);
    border-radius: 60px;
    padding: 10px 18px;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15rem;
    font-weight: 600;
    color: #4a2c0a;
    margin: 10px 0 14px;
    gap: 6px;
  }
  .btn {
    background: linear-gradient(135deg, #a8e063, #56ab2f);
    border: none;
    padding: 14px 40px;
    border-radius: 60px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(86,171,47,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: inherit;
    letter-spacing: 2px;
  }
  .btn:hover { transform: scale(1.04); box-shadow: 0 6px 24px rgba(86,171,47,0.45); }
  .btn:active { transform: scale(0.95); }

  /* confetti */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    border-radius: 4px;
    animation: confettiFall linear forwards;
    z-index: 999;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
  }
  .big-emoji {
    position: fixed;
    pointer-events: none;
    font-size: 4rem;
    animation: bigFloat 1s ease-out forwards;
    z-index: 999;
  }
  @keyframes bigFloat {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    50% { opacity: 1; transform: translateY(-60px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.8); }
  }

  .footer-info {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.08);
    font-size: 0.8rem;
    color: rgba(0,0,0,0.4);
    line-height: 1.6;
  }
  .footer-info .sep { margin: 0 8px; opacity: 0.3; }
  @media (min-width: 500px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
    .card { aspect-ratio: auto; min-height: 130px; }
    .card .emoji { font-size: 4rem; }
  }
  @media (max-width: 380px) {
    h1 { font-size: 1.3rem; }
    .question { font-size: 1.2rem; min-height: 50px; }
    .card { font-size: 3rem; }
    .btn { padding: 12px 28px; font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="game-box">
  <h1>🐾 動物找找看</h1>
  <div class="sub">👆 點選正確的動物吧！</div>

  <div class="question" id="questionDisplay">
    找找看 👉 <span class="emoji-target" id="targetEmoji">🐶</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="score-row">
    <span>⭐ 得分：<span id="scoreDisplay">0</span></span>
    <span>✅ 答對：<span id="correctCount">0</span></span>
  </div>

  <div class="message-box" id="messageBox">🎯 找出畫面中的動物！</div>

  <button class="btn" id="nextBtn">👉 下一關</button>
  <div class="footer-info">
    <span>幼保三丙 81410336</span>
    <span class="sep">|</span>
    <span>遊戲心得：動物找找看讓幼兒認識動物名稱與特徵，透過點擊配對訓練觀察力，遊戲設計需考量按鈕大小與色彩對比以符合幼兒需求。</span>
  </div>
</div>

<script>
  const ANIMALS = [
    { emoji: '🐶', name: '小狗' },
    { emoji: '🐱', name: '小貓' },
    { emoji: '🐰', name: '兔子' },
    { emoji: '🐼', name: '熊貓' },
    { emoji: '🐸', name: '青蛙' },
    { emoji: '🦁', name: '獅子' },
    { emoji: '🐮', name: '乳牛' },
    { emoji: '🐷', name: '小豬' },
    { emoji: '🐵', name: '猴子' },
    { emoji: '🦊', name: '狐狸' },
    { emoji: '🐻', name: '小熊' },
    { emoji: '🐧', name: '企鵝' },
  ];

  const PRAISE = [
    '🎉 好棒喔！','🌟 太厲害了！','👏 好聰明！','✨ 答對了！',
    '💪 超級棒！','🌈 你好厲害！','🏆 太強了！','🎊 完美！',
  ];

  const ENCOURAGE = [
    '💪 再試一次！','🤗 沒關係，再想想！','😊 加油加油！','🌟 你可以的！',
  ];

  let score = 0;
  let correct = 0;
  let currentTarget = null;
  let isLocked = false;
  let roundCards = [];
  const GRID_SIZE = 6;

  const grid = document.getElementById('grid');
  const questionDisplay = document.getElementById('questionDisplay');
  const targetEmoji = document.getElementById('targetEmoji');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const correctCount = document.getElementById('correctCount');
  const messageBox = document.getElementById('messageBox');
  const nextBtn = document.getElementById('nextBtn');

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function pickRandom(list) { return list[Math.floor(Math.random() * list.length)]; }

  function launchConfetti() {
    const colors = ['#f44336','#e91e63','#9c27b0','#3f51b5','#03a9f4','#4caf50','#ffeb3b','#ff9800'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = Math.random() * 10 + 6;
      el.style.width = size + 'px';
      el.style.height = size * 0.6 + 'px';
      el.style.background = pickRandom(colors);
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
      el.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  }

  function showBigEmoji(emoji) {
    for (let i = 0; i < 4; i++) {
      const el = document.createElement('div');
      el.className = 'big-emoji';
      el.textContent = emoji;
      el.style.left = (15 + Math.random() * 70) + 'vw';
      el.style.top = (20 + Math.random() * 40) + 'vh';
      el.style.animationDelay = (i * 0.15) + 's';
      el.style.fontSize = (3 + Math.random() * 2) + 'rem';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }
  }

  function setMessage(text, isGood = true) {
    messageBox.textContent = text;
    messageBox.style.background = isGood
      ? 'rgba(255,255,255,0.5)'
      : 'rgba(255,235,238,0.7)';
  }

  function updateStats() {
    scoreDisplay.textContent = score;
    correctCount.textContent = correct;
  }

  function newRound() {
    isLocked = false;
    nextBtn.style.display = 'none';

    // pick target
    currentTarget = pickRandom(ANIMALS);
    targetEmoji.textContent = currentTarget.emoji + '  ' + currentTarget.name;
    questionDisplay.innerHTML = '🔍 找找看 👉 <span class="emoji-target">' + currentTarget.emoji + '  ' + currentTarget.name + '</span>';

    // build card pool: 1 correct + 5 random different
    let pool = [currentTarget];
    let others = ANIMALS.filter(a => a.emoji !== currentTarget.emoji);
    shuffle(others);
    for (let i = 0; i < GRID_SIZE - 1 && i < others.length; i++) {
      pool.push(others[i]);
    }
    shuffle(pool);
    roundCards = pool;

    renderCards();
    setMessage('🔍 找出 ' + currentTarget.name + ' 在哪裡？');
  }

  function renderCards() {
    grid.innerHTML = '';
    roundCards.forEach(animal => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = animal.emoji;

      const emojiSpan = document.createElement('span');
      emojiSpan.className = 'emoji';
      emojiSpan.textContent = animal.emoji;

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = animal.name;

      card.appendChild(emojiSpan);
      card.appendChild(label);

      card.addEventListener('click', () => handleCardClick(card, animal));
      card.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleCardClick(card, animal);
      }, { passive: false });

      grid.appendChild(card);
    });
  }

  function handleCardClick(card, animal) {
    if (isLocked) return;

    if (animal.emoji === currentTarget.emoji) {
      // correct!
      isLocked = true;
      card.classList.add('correct');
      score += 10;
      correct++;
      updateStats();
      launchConfetti();
      showBigEmoji(currentTarget.emoji);
      setMessage('🎉 ' + pickRandom(PRAISE) + ' 這是 ' + currentTarget.name + '！', true);
      nextBtn.style.display = 'inline-block';
      nextBtn.textContent = '👉 下一關';
    } else {
      // wrong
      card.classList.add('wrong');
      score = Math.max(0, score - 2);
      updateStats();
      setMessage('😅 ' + pickRandom(ENCOURAGE) + ' 再找找看！', false);
      setTimeout(() => card.classList.remove('wrong'), 400);
    }
  }

  nextBtn.addEventListener('click', newRound);

  // start
  newRound();
</script>
</body>
</html>

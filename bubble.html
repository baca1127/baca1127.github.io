<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🫧 戳泡泡遊戲</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    overflow: hidden;
  }
  .game-container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 90vw;
    max-width: 520px;
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    margin-bottom: 8px;
  }
  .score-board {
    display: flex;
    justify-content: space-between;
    color: #fff;
    font-size: 1.2rem;
    font-weight: bold;
    padding: 8px 16px;
    background: rgba(0,0,0,0.2);
    border-radius: 16px;
    margin-bottom: 16px;
  }
  .game-area {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: rgba(255,255,255,0.1);
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    touch-action: manipulation;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: transform 0.15s, opacity 0.3s;
    box-shadow: inset -4px -4px 12px rgba(0,0,0,0.15),
                inset 4px 4px 12px rgba(255,255,255,0.4);
    touch-action: manipulation;
    will-change: transform, opacity;
  }
  .bubble:hover { transform: scale(1.08); }
  .bubble.pop {
    transform: scale(1.6) !important;
    opacity: 0 !important;
  }
  .emoji-burst {
    position: absolute;
    pointer-events: none;
    font-size: 1.6rem;
    animation: floatUp 0.8s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.4); }
  }
  .btn {
    background: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 40px;
    font-size: 1.1rem;
    font-weight: bold;
    color: #764ba2;
    cursor: pointer;
    margin-top: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    font-family: inherit;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
  .btn:active { transform: scale(0.95); }
  .message {
    color: #ffe066;
    font-size: 1rem;
    font-weight: bold;
    min-height: 1.6em;
    margin-top: 8px;
  }
  .timer-bar {
    height: 6px;
    background: rgba(255,255,255,0.25);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #f093fb, #f5576c);
    border-radius: 4px;
    transition: width 0.1s linear;
  }
  .footer-info {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.15);
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
  }
  .footer-info .sep { margin: 0 8px; opacity: 0.3; }
  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    .score-board { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="game-container">
  <h1>🫧 戳泡泡</h1>
  <div class="score-board">
    <span>⭐ 得分：<span id="score">0</span></span>
    <span>💥 連擊：<span id="combo">0</span></span>
  </div>
  <div class="timer-bar">
    <div class="timer-fill" id="timerFill"></div>
  </div>
  <div class="game-area" id="gameArea"></div>
  <div class="message" id="message">👆 點擊泡泡得分！</div>
  <button class="btn" id="restartBtn">🔄 重新開始</button>
  <div class="footer-info">
    <span>幼保三丙 81410336</span>
    <span class="sep">|</span>
    <span>遊戲心得：透過製作戳泡泡遊戲，學習了 JavaScript 的計時器與動畫效果，也體會到兒童遊戲需要直覺的操作與即時的回饋。</span>
  </div>
</div>

<script>
  const area = document.getElementById('gameArea');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const msgEl = document.getElementById('message');
  const timerFill = document.getElementById('timerFill');

  const EMOJIS = ['🌟','🎈','🍎','🐱','🐶','🐰','🌈','⭐','🦋','🍭','🎉','🐼','🐸','🍀','🚀','🎨'];

  let score = 0, combo = 0, maxCombo = 0, missed = 0;
  let gameActive = false, timeLeft = 30, timer = null;
  let spawnInterval = null, bubbleId = 0;
  let activeBubbles = new Set();

  function random(min, max) { return Math.random() * (max - min) + min; }

  function showMessage(text, isGood = true) {
    msgEl.textContent = text;
    msgEl.style.color = isGood ? '#ffe066' : '#ff9e9e';
  }

  function updateScore() {
    scoreEl.textContent = score;
    comboEl.textContent = combo;
  }

  function spawnBubble() {
    if (!gameActive) return;
    const size = random(48, 88);
    const x = random(0, area.clientWidth - size);
    const y = random(0, area.clientHeight - size);
    const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    const hue = Math.floor(Math.random() * 360);

    const el = document.createElement('div');
    el.className = 'bubble';
    el.id = 'b' + (bubbleId++);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.background = `radial-gradient(circle at 30% 30%, hsl(${hue},80%,75%), hsl(${hue},80%,55%))`;
    el.style.fontSize = (size * 0.38) + 'px';
    el.textContent = emoji;

    let lifetime = random(1500, 3500);
    let startTime = Date.now();
    let fadeTimer = setInterval(() => {
      if (!gameActive || !el.parentNode) { clearInterval(fadeTimer); activeBubbles.delete(el.id); return; }
      if (Date.now() - startTime >= lifetime) {
        clearInterval(fadeTimer);
        if (el.parentNode) {
          el.remove();
          activeBubbles.delete(el.id);
          if (gameActive) {
            combo = 0;
            missed++;
            updateScore();
            if (missed >= 3) {
              endGame('😢 戳掉了 ' + missed + ' 顆泡泡，遊戲結束！');
            }
          }
        }
      }
    }, 100);

    el.addEventListener('click', (e) => { popBubble(el, e); });
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      popBubble(el, e);
    }, { passive: false });

    area.appendChild(el);
    activeBubbles.add(el.id);

    el.dataset.start = startTime;
    el.dataset.lifetime = lifetime;
  }

  function popBubble(el, event) {
    if (!gameActive || !el.parentNode) return;
    el.classList.add('pop');
    activeBubbles.delete(el.id);

    // burst emoji
    const burst = document.createElement('div');
    burst.className = 'emoji-burst';
    burst.textContent = el.textContent;
    const rect = el.getBoundingClientRect();
    const areaRect = area.getBoundingClientRect();
    burst.style.left = (rect.left - areaRect.left + rect.width / 2) + 'px';
    burst.style.top = (rect.top - areaRect.top + rect.height / 2) + 'px';
    area.appendChild(burst);
    setTimeout(() => burst.remove(), 800);

    setTimeout(() => el.remove(), 200);

    combo++;
    if (combo > maxCombo) maxCombo = combo;
    score += 1 + Math.floor(combo / 3);
    updateScore();

    const messages = ['👍 好棒！','🎉 太厲害了！','💪 繼續加油！','🌟 好讚！','✨ 真厲害！','👏 拍拍手！'];
    if (combo >= 10) showMessage('🔥 ' + combo + ' 連擊！超神手！');
    else if (combo >= 5) showMessage('⚡ ' + combo + ' 連擊！太強了！');
    else showMessage(messages[Math.floor(Math.random() * messages.length)]);
  }

  function endGame(reason) {
    gameActive = false;
    clearInterval(spawnInterval);
    clearInterval(timer);

    // remove remaining bubbles
    document.querySelectorAll('.bubble').forEach(el => {
      el.remove();
      activeBubbles.delete(el.id);
    });

    timerFill.style.width = '0%';

    if (reason) {
      showMessage(reason, false);
    }

    // show final score after a moment
    setTimeout(() => {
      showMessage('🏆 最終得分：' + score + '　最高連擊：' + maxCombo + '🔥');
    }, 800);
  }

  function startGame() {
    score = 0; combo = 0; maxCombo = 0; missed = 0; bubbleId = 0;
    activeBubbles.clear();
    gameActive = true;
    timeLeft = 30;
    updateScore();
    showMessage('🎮 遊戲開始！快戳泡泡吧！');
    timerFill.style.width = '100%';

    // clean old bubbles
    area.querySelectorAll('.bubble, .emoji-burst').forEach(el => el.remove());

    // spawn bubbles
    spawnBubble();
    spawnInterval = setInterval(() => {
      if (gameActive) spawnBubble();
    }, 700);

    // countdown timer
    timer = setInterval(() => {
      if (!gameActive) { clearInterval(timer); return; }
      timeLeft -= 0.1;
      timerFill.style.width = Math.max(0, (timeLeft / 30) * 100) + '%';
      if (timeLeft <= 0) {
        endGame('⏰ 時間到！你超棒的！');
      }
    }, 100);
  }

  document.getElementById('restartBtn').addEventListener('click', () => {
    if (timer) clearInterval(timer);
    if (spawnInterval) clearInterval(spawnInterval);
    document.querySelectorAll('.bubble').forEach(el => { el.remove(); activeBubbles.delete(el.id); });
    document.querySelectorAll('.emoji-burst').forEach(el => el.remove());
    startGame();
  });

  // Adjust bubble positions on resize
  window.addEventListener('resize', () => {
    // re-layout not needed; bubbles stay at absolute positions
  });

  startGame();
</script>
</body>
</html>
